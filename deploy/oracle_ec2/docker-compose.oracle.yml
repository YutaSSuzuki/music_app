# Legacy container setup only.
# The target Oracle EC2 uses an Oracle Linux 9 RPM installation.
services:
  oracle-free:
    image: container-registry.oracle.com/database/free:latest
    container_name: oracle-free
    ports:
      - "1521:1521"
      - "5500:5500"
    env_file:
      - ./oracle.env
    volumes:
      - oracle_free_data:/opt/oracle/oradata
    restart: unless-stopped

volumes:
  oracle_free_data:
